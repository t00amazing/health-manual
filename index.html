<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

.hb-app {
  --ink: #16302e;
  --ink-soft: #4d635f;
  --line: #d7e0dc;
  --paper: #f3f6f4;
  --card: #ffffff;
  --teal: #1f5c56;
  --teal-deep: #123f3a;
  --amber: #b9762f;
  --amber-bg: #fbf0e2;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;

  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
}

.hb-app * { box-sizing: border-box; }

/* ---------- HEADER ---------- */
.hb-head {
  background: var(--teal-deep);
  color: #eef5f3;
  padding: 26px 28px 22px;
  position: relative;
}
.hb-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #8fbcb4;
  margin-bottom: 6px;
}
.hb-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.hb-sub {
  font-size: 12.5px;
  color: #b7d3cd;
}
.hb-meta-row {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.hb-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 100px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  color: #cfe6e1;
}
.hb-badge.live { border-color: #4fae9c; color: #7fe0c8; }
.hb-badge.demo { border-color: #c98a4a; color: #f0b478; }
.hb-btn {
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 600;
  padding: 7px 13px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: #eef5f3;
  cursor: pointer;
  transition: background 0.15s;
}
.hb-btn:hover { background: rgba(255,255,255,0.14); }
.hb-btn.primary {
  background: #3d8b7f;
  border-color: #3d8b7f;
  color: #fff;
}
.hb-btn.primary:hover { background: #47a093; }

/* ---------- BODY ---------- */
.hb-body { display: flex; min-height: 520px; }

.hb-nav {
  width: 220px;
  flex-shrink: 0;
  background: #eaf0ed;
  border-right: 1px solid var(--line);
  padding: 14px 10px;
}
.hb-search {
  width: 100%;
  font-family: var(--sans);
  font-size: 12.5px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid var(--line);
  margin-bottom: 12px;
  outline: none;
  background: #fff;
}
.hb-search:focus { border-color: var(--teal); }

.hb-navitem {
  display: flex;
  align-items: baseline;
  gap: 9px;
  padding: 10px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.12s;
}
.hb-navitem:hover { background: #dfe9e5; }
.hb-navitem.active { background: var(--teal); }
.hb-navitem.active .hb-navnum,
.hb-navitem.active .hb-navlabel { color: #fff; }
.hb-navnum {
  font-family: var(--mono);
  font-size: 11px;
  color: #7c948f;
  font-weight: 600;
}
.hb-navlabel {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.hb-panel { flex: 1; padding: 22px 26px; overflow: hidden; }

.hb-panel-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.hb-panel-num { font-family: var(--mono); font-size: 13px; color: var(--teal); font-weight: 700; }
.hb-panel-title { font-size: 18px; font-weight: 800; flex: 1; }
.hb-panel-count { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); margin-bottom: 18px; }

.hb-export-btn {
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 600;
  padding: 6px 11px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--teal-deep);
  cursor: pointer;
}
.hb-export-btn:hover { border-color: var(--teal); background: #eef4f2; }
.hb-export-btn:disabled { opacity: 0.5; cursor: wait; }

.hb-group { margin-bottom: 18px; }
.hb-group-title {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--teal-deep);
  padding: 8px 0 8px 0;
  border-bottom: 1.5px solid var(--line);
  margin-bottom: 8px;
}
.hb-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.hb-item:hover { background: #eef4f2; cursor: pointer; }
.hb-item.flag { background: var(--amber-bg); }
.hb-item.flag:hover { background: #f6e4cc; }
.hb-item.highlighted { box-shadow: inset 2px 0 0 #e0b400; }
.hb-item.highlighted.color-yellow { background: #fff1a6; box-shadow: inset 2px 0 0 #e0b400; }
.hb-item.highlighted.color-yellow:hover { background: #ffe985; }
.hb-item.highlighted.color-pink { background: #ffd7e8; box-shadow: inset 2px 0 0 #e07fa8; }
.hb-item.highlighted.color-pink:hover { background: #ffc2dc; }
.hb-item.highlighted.color-sky { background: #cdeeff; box-shadow: inset 2px 0 0 #4fa9d6; }
.hb-item.highlighted.color-sky:hover { background: #b3e4ff; }
.hb-mark {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--teal);
  flex-shrink: 0;
  margin-top: 1px;
}
.hb-item.flag .hb-mark { color: var(--amber); }
.hb-item-note {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--amber);
  border: 1px solid #e3bf90;
  border-radius: 5px;
  padding: 1px 6px;
  margin-left: 8px;
  vertical-align: middle;
}
.hb-item a { color: var(--teal-deep); text-decoration: underline; text-underline-offset: 2px; }
.hb-item a:hover { color: var(--teal); }

.hb-figure {
  margin: 10px 0 4px 10px;
  padding: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  display: inline-flex;
  flex-direction: column;
  gap: 8px;
  max-width: 100%;
}
.hb-figure img {
  display: block;
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  border: 1px solid var(--line);
  cursor: zoom-in;
  transition: opacity 0.12s;
}
.hb-figure img:hover { opacity: 0.88; }
.hb-figure-cap {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink);
  font-weight: 600;
  text-align: center;
}
.hb-figure-src {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-soft);
  text-align: center;
  margin-top: -4px;
}

.hb-lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,18,0.85);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 28px;
}
.hb-lightbox.open { display: flex; }
.hb-lightbox img {
  max-width: 92vw;
  max-height: 88vh;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.hb-lightbox-close {
  position: absolute;
  top: 18px;
  right: 22px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 16px;
  cursor: pointer;
}
.hb-lightbox-close:hover { background: rgba(255,255,255,0.22); }

.hb-clear-btn {
  width: 100%;
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 600;
  padding: 7px 8px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink-soft);
  cursor: pointer;
  margin-top: 10px;
}
.hb-clear-btn:hover { border-color: var(--amber); color: var(--amber); }

.hb-pen-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 10px;
  padding: 2px;
}
.hb-pen-label {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-soft);
  margin-right: 2px;
}
.hb-pen-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  padding: 0;
  border: 2px solid transparent;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
}
.hb-pen-swatch.color-yellow { background: #ffe066; }
.hb-pen-swatch.color-pink { background: #ff9dc4; }
.hb-pen-swatch.color-sky { background: #7fd4ff; }
.hb-pen-swatch.active { border-color: var(--teal-deep); transform: scale(1.12); }
.hb-hint {
  font-size: 10.5px;
  color: var(--ink-soft);
  margin-top: 6px;
  line-height: 1.5;
  padding: 0 2px;
}

.hb-links { display: flex; flex-wrap: wrap; gap: 8px; }
.hb-link {
  font-size: 12.5px;
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--teal-deep);
  text-decoration: none;
  font-weight: 600;
}
.hb-link:hover { border-color: var(--teal); background: #eef4f2; }

.hb-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-soft);
  font-size: 13px;
}
.hb-empty b { color: var(--ink); }

.hb-foot {
  padding: 10px 26px;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-soft);
  display: flex;
  justify-content: space-between;
}

@media (max-width: 640px) {
  .hb-app { border-radius: 0; }
  .hb-head { padding: 18px 16px 16px; }
  .hb-title { font-size: 19px; }
  .hb-sub { font-size: 12px; }
  .hb-meta-row { gap: 6px; }
  .hb-badge { font-size: 10px; padding: 4px 8px; }
  .hb-btn { font-size: 12px; padding: 7px 11px; }

  .hb-body { flex-direction: column; min-height: 0; }
  .hb-nav {
    width: 100%;
    display: flex;
    flex-direction: column;
    border-right: none;
    border-bottom: 1px solid var(--line);
    padding: 10px;
  }
  .hb-search { margin-bottom: 8px; font-size: 16px; } /* 16px 이상: iOS 자동확대 방지 */
  #hbNavList { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .hb-navitem { flex-shrink: 0; margin-bottom: 0; white-space: nowrap; }
  .hb-clear-btn { width: auto; margin-top: 8px; }
  .hb-pen-row { margin-top: 8px; }
  .hb-hint { display: none; }
  .hb-lightbox { padding: 12px; }
  .hb-lightbox-close { top: 10px; right: 10px; width: 34px; height: 34px; }

  .hb-panel { padding: 16px; }
  .hb-panel-title { font-size: 16px; }
  .hb-panel-head { gap: 8px; }
  .hb-export-btn { font-size: 11px; padding: 6px 9px; }
  .hb-item { font-size: 13px; padding: 9px 8px; }
  .hb-figure { margin-left: 0; }
  .hb-links { gap: 6px; }
  .hb-link { font-size: 12px; padding: 7px 10px; }

  .hb-foot { padding: 8px 16px; flex-direction: column; gap: 2px; }
}
</style>

<div class="hb-app" id="hbApp">
  <div class="hb-head">
    <div class="hb-eyebrow">School Health · 학생건강증진 업무 매뉴얼</div>
    <div class="hb-title">보건 주요 업무 가이드</div>
    <div class="hb-sub">신규 보건교사를 위한 연간 업무 인덱스 — 구글 시트를 수정하면 이 화면도 함께 바뀝니다.</div>
    <div class="hb-meta-row">
      <span class="hb-badge demo" id="hbStatusBadge">샘플 데이터 표시 중</span>
      <span class="hb-badge" id="hbUpdatedBadge">마지막 업데이트 —</span>
      <button class="hb-btn primary" id="hbRefresh" type="button">새로고침</button>
    </div>
  </div>

  <div class="hb-body">
    <div class="hb-nav">
      <input class="hb-search" id="hbSearch" type="text" placeholder="업무 내용 검색...">
      <div id="hbNavList"></div>
      <div class="hb-pen-row" id="hbPenRow">
        <span class="hb-pen-label">형광펜</span>
        <button class="hb-pen-swatch color-yellow active" data-color="yellow" title="노랑 하이라이트" type="button"></button>
        <button class="hb-pen-swatch color-pink" data-color="pink" title="분홍 하이라이트" type="button"></button>
        <button class="hb-pen-swatch color-sky" data-color="sky" title="하늘 하이라이트" type="button"></button>
      </div>
      <button class="hb-clear-btn" id="hbClearHighlights" type="button">하이라이트 모두 지우기</button>
      <div class="hb-hint">색을 고른 뒤 항목을 탭하면 하이라이트, 같은 색을 다시 탭하면 해제됩니다.</div>
    </div>
    <div class="hb-panel" id="hbPanel"></div>
  </div>

  <div class="hb-foot">
    <span id="hbFootLeft">학생건강증진교육 컨설팅</span>
    <span id="hbFootRight">항목 0개</span>
  </div>

  <div class="hb-lightbox" id="hbLightbox">
    <button class="hb-lightbox-close" id="hbLightboxClose" type="button">✕</button>
    <img id="hbLightboxImg" src="" alt="">
  </div>
</div>

    ["기타 업무","헌혈·잠복결핵검사","헌혈 연 2회(봉사 4시간) / 신규채용 교직원 잠복결핵검사 1개월 이내 실시(비용 학교지원)",""],
    ["기타 업무","흡연예방","학교흡연예방사업 우수 사례집을 참고하여 행사 운영",""],

    ["참고 사이트","바로가기","학생건강정보센터|http://www.schoolhealth.kr",""],
    ["참고 사이트","바로가기","국가건강정보포털|https://health.kdca.go.kr/healthinfo/",""],
    ["참고 사이트","바로가기","질병관리청|http://www.kdca.go.kr",""],
    ["참고 사이트","바로가기","전북보건교사회|http://www.jbbogun.co.kr/",""],
    ["참고 사이트","바로가기","전국보건교사회|http://koreanhta.org",""]
  ];

  let state = { grouped: [], activeIdx: 0, isLive: false, highlights: new Map(), penColor: 'yellow' };

  // ---------- tiny CSV parser (handles quoted fields with commas/newlines) ----------
  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], n = text[i + 1];
      if (inQuotes) {
        if (c === '"' && n === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (c === '\r') { /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  function extractSheetId(url) {
    const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : null;
  }
  function extractGid(url) {
    const m = url.match(/[#&?]gid=([0-9]+)/);
    return m ? m[1] : null;
  }

  function buildGroups(rows) {
    // rows: [대분류, 소제목, 내용, 비고]
    const map = new Map();
    rows.forEach(r => {
      const [cat, sub, content, note] = [r[0]||'', r[1]||'', r[2]||'', r[3]||''];
      if (!cat || !content) return;
      if (!map.has(cat)) map.set(cat, new Map());
      const subMap = map.get(cat);
      if (!subMap.has(sub)) subMap.set(sub, []);
      subMap.get(sub).push({ content: content.trim(), note: note.trim() });
    });
    return Array.from(map.entries()).map(([cat, subMap]) => ({
      cat,
      subs: Array.from(subMap.entries()).map(([sub, items]) => ({ sub, items }))
    }));
  }

  function totalItems(groups) {
    return groups.reduce((s, g) => s + g.subs.reduce((s2, sg) => s2 + sg.items.length, 0), 0);
  }

  const EXPORT_BTN_HTML = `<button class="hb-export-btn" type="button" data-export="1">🖼 이미지로 저장</button>`;

  function render() {
    const navList = root.querySelector('#hbNavList');
    navList.innerHTML = '';
    state.grouped.forEach((g, idx) => {
      const el = document.createElement('div');
      el.className = 'hb-navitem' + (idx === state.activeIdx ? ' active' : '');
      el.innerHTML = `<span class="hb-navnum">0${idx + 1}</span><span class="hb-navlabel">${escapeHtml(g.cat)}</span>`;
      el.addEventListener('click', () => { state.activeIdx = idx; render(); });
      navList.appendChild(el);
    });

    const g = state.grouped[state.activeIdx];
    if (!g) {
      panelEl.innerHTML = `<div class="hb-empty">표시할 항목이 없습니다.<br>html 코드 상단 <b>CONFIG.SOURCE_URL</b>에 GAS 웹앱 주소를 넣어주세요.</div>`;
    } else if (g.cat === '참고 사이트') {
      panelEl.innerHTML = `
        <div class="hb-panel-head"><span class="hb-panel-num">0${state.activeIdx + 1}</span><span class="hb-panel-title">${escapeHtml(g.cat)}</span>${EXPORT_BTN_HTML}</div>
        <div class="hb-panel-count">${g.subs.reduce((s,sg)=>s+sg.items.length,0)}개 링크</div>
        <div class="hb-links">` +
        g.subs.flatMap(sg => sg.items).map(it => {
          const [label, url] = it.content.split('|');
          const safeUrl = (url || label || '#').trim();
          return `<a class="hb-link" href="${escapeAttr(safeUrl)}" target="_blank" rel="noopener">${escapeHtml((label||safeUrl).trim())}</a>`;
        }).join('') + `</div>`;
    } else {
      panelEl.innerHTML = `
        <div class="hb-panel-head"><span class="hb-panel-num">0${state.activeIdx + 1}</span><span class="hb-panel-title">${escapeHtml(g.cat)}</span>${EXPORT_BTN_HTML}</div>
        <div class="hb-panel-count">${g.subs.reduce((s,sg)=>s+sg.items.length,0)}개 항목</div>` +
        g.subs.map(sg => {
          const asset = IMAGE_ASSETS[g.cat + '|' + sg.sub];
          let figureHtml = '';
          if (asset && Array.isArray(asset.images) && asset.images.length) {
            const imgsHtml = asset.images.map(img =>
              `<img src="${escapeAttr(img.src)}" alt="${escapeAttr(img.alt || asset.caption || sg.sub)}" loading="lazy">`
            ).join('');
            figureHtml = `<div class="hb-figure">${imgsHtml}` +
              (asset.caption ? `<div class="hb-figure-cap">${escapeHtml(asset.caption)}</div>` : '') +
              (asset.source ? `<div class="hb-figure-src">${escapeHtml(asset.source)}</div>` : '') +
              `</div>`;
          }
          return `
          <div class="hb-group">
            <div class="hb-group-title">${escapeHtml(sg.sub || '기타')}</div>
            ${sg.items.map(it => {
              const key = hashKey(g.cat + '|' + sg.sub + '|' + it.content);
              return `
              <div class="hb-item ${it.note ? 'flag' : ''}${highlightClass(key)}" data-key="${key}">
                <span class="hb-mark">${it.note ? '!' : '·'}</span>
                <span>${linkify(escapeHtml(it.content))}${it.note ? `<span class="hb-item-note">${escapeHtml(it.note)}</span>` : ''}</span>
              </div>`;
            }).join('')}
            ${figureHtml}
          </div>`;
        }).join('');
    }

    root.querySelector('#hbFootRight').textContent = `항목 ${totalItems(state.grouped)}개`;
  }

  function applySearch(query) {
    const q = query.trim().toLowerCase();
    if (!q) { state.grouped = buildGroups(state._rows); state.activeIdx = Math.min(state.activeIdx, Math.max(state.grouped.length-1,0)); render(); return; }
    const filteredRows = state._rows.filter(r => (r[2]||'').toLowerCase().includes(q) || (r[1]||'').toLowerCase().includes(q));
    state.grouped = buildGroups(filteredRows);
    state.activeIdx = 0;
    render();
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  function hashKey(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
    return 'k' + (h >>> 0).toString(36);
  }

  function highlightClass(key) {
    const c = state.highlights.get(key);
    return c ? ` highlighted color-${c}` : '';
  }

  // 참고 사이트 탭이 아닌 곳의 본문에 등장하는 URL을 자동으로 하이퍼링크로 변환
  function linkify(escapedText) {
    return escapedText.replace(/((https?:\/\/|www\.)[^\s<]+)/g, (match) => {
      let trail = '';
      const trailMatch = match.match(/[),.]+$/);
      if (trailMatch) { trail = trailMatch[0]; match = match.slice(0, -trail.length); }
      const href = match.startsWith('http') ? match : 'https://' + match;
      return `<a href="${href}" target="_blank" rel="noopener">${match}</a>${trail}`;
    });
  }

  function exportCurrentPanel(btn) {
    if (typeof html2canvas === 'undefined') {
      alert('이미지 저장 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    const g = state.grouped[state.activeIdx];
    const label = g ? g.cat : 'export';
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
    html2canvas(panelEl, { backgroundColor: '#ffffff', scale: 2, useCORS: true }).then((canvas) => {
      const a = document.createElement('a');
      a.download = '보건업무_' + label.replace(/\s+/g, '') + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }).catch(() => {
      alert('이미지 저장에 실패했습니다.');
    }).finally(() => {
      if (btn) { btn.disabled = false; btn.textContent = '🖼 이미지로 저장'; }
    });
  }

  function loadData(rows, isLive) {
    state._rows = rows;
    state.grouped = buildGroups(rows);
    state.activeIdx = 0;
    state.isLive = isLive;
    root.querySelector('#hbStatusBadge').textContent = isLive ? '구글 시트 연결됨' : '샘플 데이터 표시 중';
    root.querySelector('#hbStatusBadge').className = 'hb-badge ' + (isLive ? 'live' : 'demo');
    root.querySelector('#hbUpdatedBadge').textContent = '마지막 업데이트 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    render();
  }

  async function fetchSheet(csvUrl) {
    const res = await fetch(csvUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error('시트를 불러오지 못했습니다 (' + res.status + ')');
    const text = await res.text();
    const rows = parseCSV(text);
    // drop header row if it looks like a header
    if (rows.length && /대분류/.test(rows[0][0] || '')) rows.shift();
    if (!rows.length) throw new Error('시트에 데이터가 없습니다.');
    return rows;
  }

  let currentSourceUrl = null;
  let currentSourceType = null; // 'gas' | 'sheet'

  function isGasUrl(url) {
    return /script\.google\.com\/macros\//.test(url);
  }

  async function fetchGasJson(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('웹앱 응답 오류 (' + res.status + ')');
    const data = await res.json();
    if (!data || !Array.isArray(data.rows)) throw new Error('응답 형식이 올바르지 않습니다.');
    return data.rows;
  }

  async function loadFromUrl(rawUrl) {
    const url = rawUrl.trim();
    if (isGasUrl(url)) {
      const rows = await fetchGasJson(url);
      currentSourceUrl = url;
      currentSourceType = 'gas';
      return rows;
    }
    const id = extractSheetId(url);
    if (!id) throw new Error('올바른 링크가 아닙니다. (구글 시트 링크 또는 Apps Script 웹앱 URL)');
    const gid = extractGid(url);
    const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv` + (gid ? `&gid=${gid}` : '');
    const rows = await fetchSheet(csvUrl);
    currentSourceUrl = csvUrl;
    currentSourceType = 'sheet';
    return rows;
  }

  async function connectFromConfig() {
    if (!CONFIG.SOURCE_URL || !CONFIG.SOURCE_URL.trim()) return;
    try {
      const rows = await loadFromUrl(CONFIG.SOURCE_URL.trim());
      loadData(rows, true);
    } catch (e) {
      console.error('CONFIG.SOURCE_URL 연결 실패:', e);
    }
  }

  root.querySelector('#hbRefresh').addEventListener('click', async () => {
    if (currentSourceUrl) {
      try {
        const rows = currentSourceType === 'gas' ? await fetchGasJson(currentSourceUrl) : await fetchSheet(currentSourceUrl);
        loadData(rows, true);
      } catch (e) { /* keep last good data */ }
    } else if (CONFIG.SOURCE_URL && CONFIG.SOURCE_URL.trim()) {
      connectFromConfig();
    } else {
      loadData(FALLBACK_ROWS, false);
    }
  });
  root.querySelector('#hbSearch').addEventListener('input', (e) => applySearch(e.target.value));

  root.querySelector('#hbClearHighlights').addEventListener('click', () => {
    state.highlights.clear();
    root.querySelectorAll('.hb-item.highlighted').forEach(el => {
      el.classList.remove('highlighted', 'color-yellow', 'color-pink', 'color-sky');
    });
  });

  root.querySelectorAll('.hb-pen-swatch').forEach(btn => {
    btn.addEventListener('click', () => {
      state.penColor = btn.dataset.color;
      root.querySelectorAll('.hb-pen-swatch').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  const lightbox = root.querySelector('#hbLightbox');
  const lightboxImg = root.querySelector('#hbLightboxImg');
  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
  root.querySelector('#hbLightboxClose').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  // 하이라이트 토글(색상 적용) + 이미지 확대 + 이미지 저장 버튼: innerHTML이 다시 그려져도 계속 동작하도록 이벤트 위임
  panelEl.addEventListener('click', (e) => {
    const exportBtn = e.target.closest('[data-export]');
    if (exportBtn) { exportCurrentPanel(exportBtn); return; }

    const figureImg = e.target.closest('.hb-figure img');
    if (figureImg) { openLightbox(figureImg.src, figureImg.alt); return; }

    if (e.target.closest('a')) return; // 링크 클릭은 하이라이트 토글에서 제외

    const item = e.target.closest('.hb-item');
    if (item) {
      const key = item.dataset.key;
      const current = state.highlights.get(key);
      item.classList.remove('color-yellow', 'color-pink', 'color-sky');
      if (current === state.penColor) {
        state.highlights.delete(key);
        item.classList.remove('highlighted');
      } else {
        state.highlights.set(key, state.penColor);
        item.classList.add('highlighted', 'color-' + state.penColor);
      }
    }
  });

  // 초기 로드: 샘플 데이터를 먼저 보여주고, CONFIG.SOURCE_URL이 설정되어 있으면 실시간 데이터로 교체
  loadData(FALLBACK_ROWS, false);
  connectFromConfig();
})();
</script>
